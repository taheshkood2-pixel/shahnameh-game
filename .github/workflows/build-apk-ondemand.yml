name: Build APK (manual only)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare www folder
        run: |
          mkdir -p www
          cp index.html data.js game.js music.js sw.js manifest.json www/
          cp -r assets www/

      - name: Init Capacitor & Build Android
        run: |
          npm init -y
          npm install @capacitor/core@^6 @capacitor/cli@^6 @capacitor/android@^6
          npx cap init "Shahnameh" "com.shahnameh.game" --web-dir=www
          npx cap add android
          npx cap sync android

      - name: Build APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Copy Built APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk shahnameh-game.apk

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Shahnameh-debug-apk
          path: shahnameh-game.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: manual-apk-${{ github.run_number }}
          name: Shahnameh APK #${{ github.run_number }}
          files: shahnameh-game.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
