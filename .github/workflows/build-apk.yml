name: Build APK & Deploy Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
        continue-on-error: true
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
        continue-on-error: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true

  build-apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Prepare Web Directory
        run: |
          mkdir -p www
          cp index.html data.js game.js music.js sw.js manifest.json www/
          cp -r assets www/

      - name: Build Android App with Capacitor
        run: |
          npm init -y
          npm install @capacitor/core@^6 @capacitor/cli@^6 @capacitor/android@^6
          npx cap init "Shahnameh" "com.shahnameh.game" --web-dir=www
          npx cap add android
          npx cap sync android

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Copy Built APK
        run: |
          cp android/app/build/outputs/apk/debug/app-debug.apk shahnameh-game.apk

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: shahnameh-game-apk
          path: shahnameh-game.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: release-v${{ github.run_number }}
          name: "🎮 Shahnameh Game APK v${{ github.run_number }}"
          body: |
            ## 🏛 Shahnameh Game APK Build #${{ github.run_number }}
            
            - Built automatically via GitHub Actions.
            - Download `shahnameh-game.apk` below and install on Android devices.
          files: shahnameh-game.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
