name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    needs: deploy-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Capacitor and dependencies
        run: |
          echo "📦 Installing Capacitor..."
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          echo "✅ Capacitor installed successfully"
          npm list @capacitor/core

      - name: Prepare web directory
        run: |
          echo "📁 Creating www directory..."
          mkdir -p www
          
          echo "📋 Listing files in current directory:"
          ls -la
          
          echo "📋 Copying files to www..."
          cp index.html www/ || echo "⚠️ index.html not found"
          cp data.js www/ || echo "⚠️ data.js not found"
          cp game.js www/ || echo "⚠️ game.js not found"
          cp music.js www/ || echo "⚠️ music.js not found"
          cp sw.js www/ || echo "⚠️ sw.js not found"
          cp manifest.json www/ || echo "⚠️ manifest.json not found"
          cp -r assets www/ || echo "⚠️ assets folder not found"
          
          echo "📂 Files in www directory:"
          ls -la www/
          du -sh www/

      - name: Initialize Capacitor
        run: |
          echo "⚙️ Creating capacitor.config.json..."
          cat > capacitor.config.json << 'CEOF'
          {
            "appId": "com.shahnameh.game",
            "appName": "Shahnameh",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          CEOF
          
          echo "✅ Capacitor config created"
          cat capacitor.config.json

      - name: Add Android platform
        run: |
          echo "🔧 Adding Android platform..."
          npx cap add android
          
          echo "✅ Android platform added"
          ls -la android/

      - name: Sync Capacitor
        run: |
          echo "🔄 Syncing Capacitor..."
          npx cap sync android
          
          echo "✅ Capacitor synced"

      - name: Build APK
        run: |
          echo "🏗️ Building APK..."
          cd android
          
          echo "📋 Making gradlew executable..."
          chmod +x gradlew
          
          echo "🔨 Running Gradle build..."
          ./gradlew assembleDebug --no-daemon --stacktrace
          
          echo "✅ Build completed"
          
          echo "📋 Looking for APK..."
          find . -name "*.apk" -type f
          
          echo "📋 Copying APK..."
          cp app/build/outputs/apk/debug/app-debug.apk ../shahnameh-v22.apk
          
          echo "✅ APK copied"
          ls -lh ../shahnameh-v22.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shahnameh-apk
          path: shahnameh-v22.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v22-apk
          name: "🎮 Shahnameh v22 APK"
          body: |
            ## 🏛 Shahnameh: Rise of Kings v22
            
            ### 📱 Install
            1. Download the APK file below
            2. Enable "Install from unknown sources" in your Android settings
            3. Install and enjoy the game!
            
            ### 🌐 Play Online
            https://taheshkood2-pixel.github.io/shahnameh-game/
          files: shahnameh-v22.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
