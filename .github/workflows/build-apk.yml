name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    needs: deploy-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept Android licenses
        run: yes | sdkmanager --licenses || true

      - name: Install Capacitor
        run: npm install @capacitor/core @capacitor/cli @capacitor/android

      - name: Prepare web directory (lightweight)
        run: |
          mkdir -p www
          cp index.html data.js game.js music.js sw.js manifest.json www/
          
          # Only copy essential assets (skip audio to save space)
          mkdir -p www/assets
          cp -r assets/heroes www/assets/ 2>/dev/null || true
          cp -r assets/enemies www/assets/ 2>/dev/null || true
          cp -r assets/items www/assets/ 2>/dev/null || true
          cp -r assets/bg www/assets/ 2>/dev/null || true
          cp -r assets/story www/assets/ 2>/dev/null || true
          cp -r assets/ui www/assets/ 2>/dev/null || true
          cp -r assets/fonts www/assets/ 2>/dev/null || true
          cp -r assets/sprites www/assets/ 2>/dev/null || true
          cp -r assets/pets www/assets/ 2>/dev/null || true
          # Skip audio (too large for APK) - can stream online
          echo "www size:"
          du -sh www/

      - name: Initialize and sync Capacitor
        run: |
          cat > capacitor.config.json << 'CEOF'
          {
            "appId": "com.shahnameh.game",
            "appName": "Shahnameh",
            "webDir": "www",
            "bundledWebRuntime": false
          }
          CEOF
          
          npx cap add android
          npx cap sync android

      - name: Fix Gradle memory
        run: |
          cd android
          echo "org.gradle.jvmargs=-Xmx2048m" >> gradle.properties
          echo "android.useAndroidX=true" >> gradle.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          
          echo "🔨 Building APK with Gradle..."
          ./gradlew assembleDebug --no-daemon --stacktrace 2>&1 | tee build.log
          
          BUILD_STATUS=${PIPESTATUS[0]}
          
          if [ $BUILD_STATUS -ne 0 ]; then
            echo "❌ Build failed! Showing last 80 lines:"
            tail -80 build.log
            exit $BUILD_STATUS
          fi
          
          echo "✅ Build succeeded!"
          find . -name "*.apk" -type f -exec ls -lh {} \;
          cp app/build/outputs/apk/debug/app-debug.apk ../shahnameh-v22.apk
          ls -lh ../shahnameh-v22.apk

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: shahnameh-apk-v22
          path: shahnameh-v22.apk
          retention-days: 30

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v22-apk
          name: "🎮 Shahnameh v22 APK"
          body: |
            ## 🏛 Shahnameh: Rise of Kings v22
            
            ### 📱 Install
            1. Download APK
            2. Enable unknown sources
            3. Install & play!
            
            ### 🌐 Online: https://taheshkood2-pixel.github.io/shahnameh-game/
          files: shahnameh-v22.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
