name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v4
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  build-apk:
    needs: deploy-pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          api-level: 33
          build-tools: 33.0.2

      - name: Accept Android licenses
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platform-tools" "platforms;android-33" "build-tools;33.0.2"

      - name: Wait for Pages deployment
        run: sleep 25

      - name: Build APK with Capacitor
        run: |
          set -e
          
          echo "📦 Installing Capacitor..."
          npm init -y
          npm install @capacitor/core @capacitor/cli @capacitor/android
          
          echo "⚙️ Creating capacitor config..."
          cat > capacitor.config.json << 'CEOF'
          {
            "appId": "com.shahnameh.game",
            "appName": "شاهنامه",
            "webDir": "www",
            "server": {
              "androidScheme": "https"
            }
          }
          CEOF
          
          echo "📁 Preparing web files..."
          mkdir -p www
          ls -la
          
          # Copy all web files
          cp index.html data.js game.js music.js sw.js manifest.json www/ || echo "Warning: Some JS files missing"
          cp -r assets www/ || echo "Warning: assets folder missing"
          
          echo "📂 Files in www:"
          ls -la www/
          
          echo "🔧 Adding Android platform..."
          npx cap add android || {
            echo "❌ Failed to add Android platform"
            exit 1
          }
          
          echo "🔄 Syncing Capacitor..."
          npx cap sync android || {
            echo "❌ Failed to sync"
            exit 1
          }
          
          echo "🏗️ Building APK..."
          cd android
          chmod +x gradlew
          
          # Build with more memory and verbose output
          export GRADLE_OPTS="-Xmx2048m"
          ./gradlew assembleDebug --no-daemon --stacktrace --info 2>&1 | tee build.log
          
          if [ $? -ne 0 ]; then
            echo "❌ Build failed! Last 50 lines:"
            tail -50 build.log
            exit 1
          fi
          
          echo "📋 Copying APK..."
          cp app/build/outputs/apk/debug/app-debug.apk ../shahnameh-v22.apk || {
            echo "❌ APK not found at expected location"
            find . -name "*.apk" -type f
            exit 1
          }
          
          echo "✅ APK built successfully!"
          ls -lh ../shahnameh-v22.apk

      - name: Upload APK Artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: shahnameh-game-v22
          path: shahnameh-v22.apk
          retention-days: 30

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v22-apk
          name: "🎮 شاهنامه v22 APK"
          body: |
            ## 🏛 Shahnameh: Rise of Kings v22
            
            ### ✅ Features
            - 26 heroes (SSR/SR/R) with 5 classes
            - 24 enemies across 7 chapters
            - 378 items with unique art
            - 68 voice files (Persian narration)
            - PixiJS particle effects
            - Cinematic intro with voice
            - Prestige system (10 levels)
            - 100+ hours gameplay
            
            ### 📱 Install
            1. Download APK below
            2. Enable "Install from unknown sources"
            3. Install and play!
            
            ### 🌐 Also play online
            https://taheshkood2-pixel.github.io/shahnameh-game/
          files: shahnameh-v22.apk
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
