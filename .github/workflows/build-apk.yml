name: Deploy PWA to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only deploy Pages — APK build is disabled until manually enabled.
# To build APK, use workflow-dispatch with the "Build APK" workflow (build-apk-ondemand.yml)

jobs:
  deploy-pages:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - name: Prepare site
        run: |
          mkdir -p _site
          rsync -av --exclude='.git' --exclude='.github' --exclude='_site' --exclude='*.md' ./ _site/
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
      - uses: actions/deploy-pages@v4
        id: deployment
