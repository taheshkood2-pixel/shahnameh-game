<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
<defs>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#1a0000"/><stop offset="50%" stop-color="#2d0000"/><stop offset="100%" stop-color="#0a0a15"/></linearGradient>
<radialGradient id="fire" cx="50%" cy="100%"><stop offset="0%" stop-color="#ff6600" stop-opacity="0.6"/><stop offset="100%" stop-color="transparent"/></radialGradient>
</defs>
<rect width="800" height="450" fill="url(#sky)"/>
<rect x="0" y="300" width="800" height="150" fill="#1a0a00"/>
<!-- Ruined columns -->
<rect x="80" y="150" width="30" height="200" fill="#2d1810" rx="3"/>
<rect x="70" y="140" width="50" height="15" fill="#3d2820" rx="2"/>
<rect x="250" y="120" width="35" height="230" fill="#2d1810" rx="3"/>
<rect x="240" y="110" width="55" height="15" fill="#3d2820" rx="2"/>
<rect x="550" y="140" width="30" height="210" fill="#2d1810" rx="3"/>
<rect x="700" y="160" width="28" height="190" fill="#2d1810" rx="3"/>
<!-- Fire effects -->
<ellipse cx="400" cy="350" rx="150" ry="60" fill="url(#fire)"/>
<ellipse cx="150" cy="360" rx="80" ry="40" fill="url(#fire)" opacity="0.5"/>
<ellipse cx="650" cy="355" rx="90" ry="45" fill="url(#fire)" opacity="0.4"/>
<!-- Scattered weapons -->
<line x1="350" y1="320" x2="370" y2="380" stroke="#666" stroke-width="3" opacity="0.4"/>
<line x1="500" y1="330" x2="520" y2="370" stroke="#666" stroke-width="3" opacity="0.3"/>
<!-- Moon -->
<circle cx="650" cy="60" r="25" fill="#f5e9c8" opacity="0.2"/>
</svg>