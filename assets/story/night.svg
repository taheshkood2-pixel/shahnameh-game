<path d="M50 350 Q60 280 70 350" fill="#0a0a15"/>
<path d="M150 350 Q165 260 180 350" fill="#0a0a15"/>
<path d="M300 350 Q310 290 320 350" fill="#0a0a15"/>
<path d="M500 350 Q520 250 540 350" fill="#0a0a15"/>
<path d="M650 350 Q660 280 670 350" fill="#0a0a15"/>
<path d="M750 350 Q755 300 760 350" fill="#0a0a15"/>
