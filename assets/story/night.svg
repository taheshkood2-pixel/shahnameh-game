<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
<defs>
<linearGradient id="sky" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#000022"/><stop offset="100%" stop-color="#0a0a2e"/></linearGradient>
<radialGradient id="moon_glow" cx="50%" cy="50%"><stop offset="0%" stop-color="#f5e9c8" stop-opacity="0.3"/><stop offset="100%" stop-color="transparent"/></radialGradient>
</defs>
<rect width="800" height="450" fill="url(#sky)"/>
<!-- Stars -->
<circle cx="100" cy="50" r="1.5" fill="#fff" opacity="0.7"/>
<circle cx="250" cy="30" r="1" fill="#fff" opacity="0.5"/>
<circle cx="400" cy="60" r="1.2" fill="#fff" opacity="0.6"/>
<circle cx="550" cy="25" r="0.8" fill="#fff" opacity="0.4"/>
<circle cx="680" cy="70" r="1.3" fill="#fff" opacity="0.5"/>
<circle cx="150" cy="100" r="1" fill="#fff" opacity="0.4"/>
<circle cx="350" cy="120" r="0.7" fill="#fff" opacity="0.3"/>
<circle cx="500" cy="90" r="1.1" fill="#fff" opacity="0.5"/>
<circle cx="700" cy="130" r="0.9" fill="#fff" opacity="0.4"/>
<circle cx="50" cy="150" r="1.2" fill="#fff" opacity="0.5"/>
<!-- Moon -->
<circle cx="600" cy="80" r="50" fill="url(#moon_glow)"/>
<circle cx="600" cy="80" r="25" fill="#f5e9c8" opacity="0.5"/>
<circle cx="590" cy="75" r="23" fill="#000022"/>
<!-- Garden/trees silhouette -->
